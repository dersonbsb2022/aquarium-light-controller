services:
  aquarium-light:
    build: .
    container_name: aquarium-light
    restart: unless-stopped
    network_mode: host    # necessário para descobrir o controlador na rede local
    volumes:
      - aquarium_data:/data
    environment:
      - CONFIG_PATH=/data/config.json
      - WEB_PORT=8080
      - API_PORT=8081
      - TZ=America/Sao_Paulo
    # Se preferir não usar network_mode: host, descomente abaixo:
    # ports:
    #   - "8080:8080"
    #   - "8081:8081"

volumes:
  aquarium_data:

services:
  aquarium-light:
    image: ghcr.io/dersonbsb2022/aquarium-light-controller:latest
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - aquarium_data:/data
    environment:
      - CONFIG_PATH=/data/config.json
      - WEB_PORT=8080
      - API_PORT=8081
      - TZ=America/Sao_Paulo
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

volumes:
  aquarium_data:
